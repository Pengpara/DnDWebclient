<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(94, 156, 255, 0.5);
        }

        header p {
            font-size: 1.3rem;
            color: #b0b0b0;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            font-style: italic;
        }

        .projects-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 2rem;
            color: #fff;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #5e9cff, #8b5cf6);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            padding: 20px;
            justify-items: center;
        }

        .project-circle {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .project-circle:hover {
            transform: scale(1.15) translateY(-10px);
        }

        .circle-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid transparent;
            background: linear-gradient(#1a1a2e, #1a1a2e) padding-box,
            linear-gradient(135deg, #5e9cff, #8b5cf6) border-box;
            transition: all 0.4s ease;
        }

        .project-circle:hover .circle-container {
            box-shadow: 0 12px 40px rgba(94, 156, 255, 0.6),
            0 0 60px rgba(139, 92, 246, 0.4);
            border-width: 4px;
        }

        .circle-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .project-circle:hover .circle-image {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .circle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(94, 156, 255, 0.8), rgba(139, 92, 246, 0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 50%;
        }

        .project-circle:hover .circle-overlay {
            opacity: 1;
        }

        .overlay-text {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .project-title {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #fff;
            font-weight: 500;
        }

        .detail-section {
            display: none;
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            margin: 40px auto;
            max-width: 1200px;
            border: 2px solid rgba(94, 156, 255, 0.3);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }

        .detail-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(94, 156, 255, 0.3);
            padding-bottom: 20px;
        }

        .detail-header h2 {
            font-size: 2.5rem;
            color: #fff;
        }

        .close-btn {
            background: linear-gradient(135deg, #5e9cff, #8b5cf6);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(94, 156, 255, 0.4);
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(94, 156, 255, 0.6);
        }

        .detail-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #d0d0d0;
        }

        .detail-content h3 {
            color: #5e9cff;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tech-tag {
            background: rgba(94, 156, 255, 0.2);
            color: #5e9cff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(94, 156, 255, 0.4);
        }

        .project-link {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #5e9cff, #8b5cf6);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(94, 156, 255, 0.4);
        }

        .project-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(94, 156, 255, 0.6);
        }

        .embedded-project {
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .embedded-project iframe {
            width: 100%;
            height: 600px;
            border: none;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            margin-top: 60px;
        }

        footer a {
            color: #5e9cff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #8b5cf6;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }

            .projects-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 30px;
            }

            .project-circle {
                width: 160px;
                height: 160px;
            }

            .detail-section {
                padding: 30px 20px;
            }

            .detail-header {
                flex-direction: column;
                gap: 15px;
            }

            .detail-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Viktor Lærkes</h1>
        <p>Datamatiker studerende</p>
        <p class="subtitle"></p>
    </header>

    <section class="projects-section">
        <h2 class="section-title">Mine Projekter</h2>
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects will be dynamically added here -->
        </div>
    </section>

    <!-- Detail sections for each project -->
    <div id="projectDetails"></div>

    <footer>
        <p>&copy; </p>
        <p>
            <a href="https://github.com/yourusername" target="_blank">GitHub</a> |
            <a href="https://linkedin.com/in/yourusername" target="_blank">LinkedIn</a> |
            <a href="mailto:your.email@example.com">Email</a>
        </p>
    </footer>
</div>

<script>
    const projects = [
        {
            id: 'dnd-webclient',
            title: 'D&D Web Client',
            image: 'https://via.placeholder.com/400x400/5e9cff/ffffff?text=D%26D+Client', // Replace with your actual screenshot
            description: 'An interactive Dungeons & Dragons web client for managing campaigns, characters, and game sessions.',
            techStack: ['HTML', 'CSS', 'JavaScript', 'Node.js'],
            liveUrl: 'https://github.com/Pengpara/DnDWebclient',
            isEmbedded: true,
            embedUrl: './dnd-app/index.html' // Update this path to your actual DnD app entry point
        }
        // Add more projects below using the same format:
        // {
        //     id: 'project-name',
        //     title: 'Project Title',
        //     image: 'path/to/screenshot.jpg',
        //     description: 'Project description here',
        //     techStack: ['Tech1', 'Tech2', 'Tech3'],
        //     liveUrl: 'https://your-project-url.com',
        //     isEmbedded: false
        // }
    ];

    // Generate project circles
    const projectsGrid = document.getElementById('projectsGrid');
    const projectDetailsContainer = document.getElementById('projectDetails');

    projects.forEach(project => {
        // Create circle element
        const circle = document.createElement('div');
        circle.className = 'project-circle';
        circle.innerHTML = `
                <div class="circle-container">
                    <img src="${project.image}" alt="${project.title}" class="circle-image">
                    <div class="circle-overlay">
                        <span class="overlay-text">View Details</span>
                    </div>
                </div>
                <div class="project-title">${project.title}</div>
            `;
        circle.addEventListener('click', () => showProject(project.id));
        projectsGrid.appendChild(circle);

        // Create detail section
        const detailSection = document.createElement('div');
        detailSection.className = 'detail-section';
        detailSection.id = `detail-${project.id}`;
        detailSection.innerHTML = `
                <div class="detail-header">
                    <h2>${project.title}</h2>
                    <button class="close-btn" onclick="closeProject('${project.id}')">Close</button>
                </div>
                <div class="detail-content">
                    <p>${project.description}</p>
                    <h3>Technologies Used</h3>
                    <div class="tech-stack">
                        ${project.techStack.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                    </div>
                    ${project.liveUrl !== '#' ? `<a href="${project.liveUrl}" target="_blank" class="project-link">View Project</a>` : ''}
                    ${project.isEmbedded ? `
                        <div class="embedded-project">
                            <iframe src="${project.embedUrl}" title="${project.title}"></iframe>
                        </div>
                    ` : ''}
                </div>
            `;
        projectDetailsContainer.appendChild(detailSection);
    });

    function showProject(projectId) {
        // Hide all detail sections
        document.querySelectorAll('.detail-section').forEach(section => {
            section.classList.remove('active');
        });

        // Show selected project
        const detailSection = document.getElementById(`detail-${projectId}`);
        detailSection.classList.add('active');

        // Smooth scroll to detail section
        detailSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeProject(projectId) {
        const detailSection = document.getElementById(`detail-${projectId}`);
        detailSection.classList.remove('active');

        // Scroll back to projects grid
        document.querySelector('.projects-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
</body>
</html>
